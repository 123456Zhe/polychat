services:
  polychat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: polychat
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DB_PATH: /app/data/polychat.db
      UPLOAD_DIR: /app/data/uploads
      AVATAR_DIR: /app/data/avatars
      ONEBOT_REVERSE_URL: ${ONEBOT_REVERSE_URL:-}
      ONEBOT_BOT_TOKEN: ${ONEBOT_BOT_TOKEN:-}
      ONEBOT_ACCESS_TOKEN: ${ONEBOT_ACCESS_TOKEN:-}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
